<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HD9HWDCCZB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-HD9HWDCCZB');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concall Research · Equity Insights Elite</title>
  <meta name="description" content="Q4FY26 concall guidance tracker across Indian equity sectors — Co-Working, PEB, Gold Finance, MFI, Real Estate">
  <meta property="og:title" content="Concall Research · Equity Insights Elite">
  <meta property="og:description" content="Sector-wise concall guidance tracker for Indian equities">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://concall.equityinsightselite.com">
  <link rel="canonical" href="https://concall.equityinsightselite.com">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #F1F5F9;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #0F172A;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Layout grids ─────────────────────────────── */
    .sector-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }

    @media (max-width: 680px) {
      .metrics-grid  { grid-template-columns: repeat(2, 1fr); }
      .sector-grid   { grid-template-columns: 1fr; }
      .company-grid  { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 380px) {
      .company-grid  { grid-template-columns: 1fr; }
    }

    /* ── Card hover ───────────────────────────────── */
    .hov { transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; cursor: pointer; }
    .hov:hover { transform: translateY(-3px); }

    /* ── Mobile nav ──────────────────────────────── */
    .nav-back { display:flex; align-items:center; gap:5px; background:none; border:1px solid #E2E8F0; border-radius:8px; padding:6px 12px; font-size:12px; color:#475569; cursor:pointer; font-family:inherit; transition:border-color 0.18s,color 0.18s; }
    .nav-back:hover { border-color:#CBD5E1; color:#0F172A; }
    .nav-get  { font-size:12px; font-weight:700; color:#fff; text-decoration:none; background:#2563EB; padding:7px 14px; border-radius:8px; white-space:nowrap; transition:background 0.18s; }
    .nav-get:hover { background:#1D4ED8; }
    @media (max-width: 600px) {
      .nav-inner .nav-brand-text { display: none; }
      .nav-get-text { display: none; }
      .nav-get-icon { display: inline !important; }
      .nav-get { padding: 7px 11px; border-radius: 8px; }
    }

    /* ── CTA banner ──────────────────────────────── */
    .cta-banner { display: flex; align-items: center; gap: 28px; }
    .cta-icon   { display: flex; }
    @media (max-width: 600px) {
      .cta-banner { flex-direction: column; align-items: stretch; gap: 12px; padding: 20px 18px !important; }
      .cta-icon   { display: none; }
      .cta-banner p { font-size: 12px !important; text-align: center; }
      .cta-banner a { text-align: center; padding: 10px 16px !important; font-size: 12px !important; }
    }

    /* ── Sticky bar ──────────────────────────────── */
    .sb-full  { display: inline; }
    .sb-short { display: none; }
    @media (max-width: 600px) {
      .sb-full  { display: none; }
      .sb-short { display: inline; font-size: 12px; }
    }

    /* ── CTA buttons ─────────────────────────────── */
    .cta-btn {
      flex-shrink: 0; color: #fff; text-decoration: none; font-weight: 700;
      border: 1.5px solid rgba(255,255,255,0.5); border-radius: 10px;
      background: rgba(255,255,255,0.18); transition: background 0.18s ease, color 0.18s ease;
      cursor: pointer; display: block; white-space: nowrap; text-align: center;
    }
    .cta-btn:hover { background: #fff; color: #1D4ED8; }

    /* ── Scrollbar ────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #F1F5F9; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    /* ── Loading spinner ──────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #E2E8F0; border-top-color: #7C3AED;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script>
'use strict';
const { useState, useEffect } = React;
const h = React.createElement;

/* ── Design tokens ───────────────────────────────── */
const BG='#F1F5F9', SRF='#FFFFFF', BRD='#E2E8F0', TX='#0F172A', S2='#475569', MU='#94A3B8';

/* ── Helpers ─────────────────────────────────────── */
const sn  = n => n.replace(/ Ltd$/,'').replace(/ Limited$/,'').replace(/ Private Limited$/,'');
const pct = m => m.positive === 1 ? '#059669' : m.positive === -1 ? '#EF4444' : MU;
const gs  = (sectors, id) => sectors.find(s => s.id === id);

/* ── Data files to load (order = display order) ─── */
const DATA_FILES = [
  'co-working',
  'peb',
  'gold-finance',
  'mfi',
  'affordable-housing',
  'value-retail',
  'jewelry-retail',
  'wires-cables',
  'hospitals',
  'diagnostics',
  'ems',
  'capital-markets',
  'hotels',
  'nbfc',
  'sfb',
  'writing-instruments',
  'auto-anc',
  'real-estate',
  'internet-platform',
  'cement',
  'fmcg',
  'banks',
  'building-material',
  'exporters',
  'recycling',
  'pipes-tubes',
];

/* ── App ─────────────────────────────────────────── */
const CTA_TEXT = 'Need custom equity research? Explore our services. Built for serious investors.';
const CTA_HREF = 'https://equityinsightselite.com/#pricing';
const CTA_BLUE = '#2563EB';
const CTA_BLUE_DARK = '#1D4ED8';

function StickyBar({ dismissed, onDismiss }) {
  if (dismissed) return null;
  return h('div', { style:{
    position:'fixed', bottom:0, left:0, right:0, zIndex:200,
    background: CTA_BLUE, borderTop:'1px solid #1D4ED8',
    padding:'10px 20px', display:'flex', alignItems:'center', justifyContent:'center', gap:16,
    boxShadow:'0 -4px 24px rgba(37,99,235,0.30)'
  }},
    h('p', { style:{ fontSize:13, color:'#fff', margin:0, flex:1, textAlign:'center' } },
      h('span', { className:'sb-full' }, CTA_TEXT),
      h('span', { className:'sb-short' }, 'Need custom equity research?')
    ),
    h('a', {
      href: CTA_HREF, target:'_blank', rel:'noopener noreferrer',
      className: 'cta-btn',
      style:{ fontSize:12, padding:'8px 18px', borderRadius:8 }
    }, 'Get Started →'),
    h('button', {
      onClick: onDismiss,
      style:{ background:'none', border:'none', color:'rgba(255,255,255,0.7)', fontSize:18, lineHeight:1, padding:'4px 6px', cursor:'pointer', flexShrink:0 }
    }, '×')
  );
}

function App() {
  const [sectors,  setSectors]  = useState(null);   // null = loading
  const [concall,  setConcall]  = useState({});
  const [loadErr,  setLoadErr]  = useState(null);
  const [view,     setView]     = useState('s');
  const [sid,      setSid]      = useState(null);
  const [co,       setCo]       = useState(null);
  const [barDone,  setBarDone]  = useState(false);

  /* ── Sync state from history on back/forward ── */
  useEffect(() => {
    const onPop = e => {
      const st = e.state;
      // No state or we hit the guard buffer — stay on sectors and repush so
      // pressing back again doesn't leave the app.
      if (!st || st._guard) {
        setView('s'); setSid(null); setCo(null);
        history.pushState({ view:'s', sid:null, co:null }, '');
        return;
      }
      setView(st.view); setSid(st.sid || null); setCo(st.co || null);
      window.scrollTo({ top:0, behavior:'smooth' });
    };
    window.addEventListener('popstate', onPop);
    // Guard entry first, then the real sectors entry on top.
    // If the user presses back past sectors they hit the guard and stay.
    history.replaceState({ view:'s', sid:null, co:null, _guard:true }, '');
    history.pushState({ view:'s', sid:null, co:null }, '');
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  /* ── Fetch all sector JSON files on mount ── */
  useEffect(() => {
    Promise.all(
      DATA_FILES.map(f =>
        fetch('./data/' + f + '.json')
          .then(r => { if (!r.ok) throw new Error(f + '.json returned ' + r.status); return r.json(); })
          .catch(e => { console.warn('Could not load', f, e.message); return null; })
      )
    ).then(results => {
      const loaded = [];
      const cc     = {};
      DATA_FILES.forEach((f, i) => {
        const d = results[i];
        if (!d || !d.sector) return;
        const entries = d.concall || {};
        // Strip _template key — it's a placeholder for the editor, not real data
        delete entries['_template'];
        loaded.push({
          id:  f,
          nm:  d.sector.name,
          desc: d.sector.description,
          ac:  d.sector.accent,
          al:  d.sector.accentLight,
          cos: d.companies || [],
          d:   Object.keys(entries).length > 0
        });
        Object.assign(cc, entries);
      });
      setSectors(loaded);
      setConcall(cc);
    }).catch(e => setLoadErr(e.message));
  }, []);

  /* ── Page title sync ── */
  useEffect(() => {
    if (!sectors) return;
    const sec = sid ? gs(sectors, sid) : null;
    document.title =
      view === 's' ? 'Concall Research · Equity Insights Elite'
      : view === 'c' ? sec.nm + ' · Concall Research'
      : sn(co).split(' ').slice(0,3).join(' ') + ' · Q4FY26';
  }, [view, sid, co, sectors]);

  /* ── Navigation ── */
  const goS = ()  => { history.pushState({ view:'s', sid:null, co:null }, ''); setView('s'); setSid(null); setCo(null); };
  const goC = id  => { history.pushState({ view:'c', sid:id,   co:null }, ''); setSid(id); setView('c'); window.scrollTo({ top:0, behavior:'smooth' }); };
  const goD = nm  => { history.pushState({ view:'d', sid,      co:nm  }, ''); setCo(nm);  setView('d'); window.scrollTo({ top:0, behavior:'smooth' }); };

  /* ── Loading / Error screens ── */
  if (loadErr) return h('div', { style:{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'100vh', gap:16 } },
    h('div', { style:{ fontSize:32 } }, '⚠️'),
    h('div', { style:{ fontSize:15, fontWeight:600, color:TX } }, 'Failed to load data'),
    h('p',   { style:{ fontSize:13, color:S2, maxWidth:400, textAlign:'center' } }, loadErr),
    h('p',   { style:{ fontSize:12, color:MU, maxWidth:400, textAlign:'center' } }, 'Make sure the site is served via HTTP, not opened as a local file. Run: python -m http.server 8000')
  );

  if (!sectors) return h('div', { style:{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'100vh', gap:16 } },
    h('div', { className:'spinner' }),
    h('div', { style:{ fontSize:13, color:MU } }, 'Loading research data…')
  );

  const sec = sid ? gs(sectors, sid) : null;
  const totalCos = sectors.reduce((a, s) => a + s.cos.length, 0);

  return h('div', { style:{ display:'flex', flexDirection:'column', minHeight:'100vh' } },

    /* ── Navbar ────────────────────────────────── */
    h('nav', { className: view !== 's' ? 'nav-inner' : '', style:{ background:SRF, borderBottom:`1px solid ${BRD}`, position:'sticky', top:0, zIndex:50, boxShadow:'0 1px 10px rgba(15,23,42,0.06)' } },
      h('div', { style:{ maxWidth:1100, margin:'0 auto', padding:'0 20px', height:58, display:'flex', alignItems:'center', justifyContent:'space-between', gap:12 } },

        /* ── Left: logo + brand / breadcrumb ── */
        h('div', { style:{ display:'flex', alignItems:'center', gap:10, minWidth:0, flex:1 } },
          h('a', { href:'https://equityinsightselite.com', target:'_blank', rel:'noopener noreferrer', style:{ flexShrink:0, lineHeight:0 } },
            h('img', { src:'logo.png', alt:'Equity Insights Elite', style:{ width:32, height:32, borderRadius:9, objectFit:'cover', display:'block', boxShadow:'0 1px 4px rgba(0,0,0,0.10)' } })
          ),
          view === 's'
            ? h('span', { className:'nav-brand-text', style:{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:19, color:TX, cursor:'pointer', letterSpacing:'-0.4px' }, onClick:goS }, 'Concall Research')
            : h('div', { style:{ display:'flex', alignItems:'center', gap:5, minWidth:0 } },
                h('span', { className:'nav-brand-text', style:{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:13, color:TX, cursor:'pointer', flexShrink:0 }, onClick:goS }, 'Concall Research'),
                h('span', { style:{ color:BRD, fontSize:18, flexShrink:0, lineHeight:1 } }, '/'),
                h('span', { style:{ fontSize:12, fontWeight:600, color:sec?.ac, cursor:'pointer', flexShrink:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }, onClick:()=>goC(sid) }, sec?.nm),
                view === 'd' && h(React.Fragment, null,
                  h('span', { style:{ color:BRD, fontSize:18, flexShrink:0, lineHeight:1 } }, '/'),
                  h('span', { style:{ fontSize:12, color:S2, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0 } },
                    sn(co).split(' ').slice(0,3).join(' ')
                  )
                )
              )
        ),

        /* ── Right: back button + CTA ── */
        h('div', { style:{ display:'flex', alignItems:'center', gap:8, flexShrink:0 } },
          view !== 's' && h('button', { className:'nav-back', onClick: view === 'd' ? ()=>goC(sid) : goS },
            h('svg', { width:13, height:13, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2.5, strokeLinecap:'round', strokeLinejoin:'round' },
              h('path', { d:'M19 12H5M12 5l-7 7 7 7' })
            ),
            'Back'
          ),
          h('a', { className:'nav-get', href: CTA_HREF, target:'_blank', rel:'noopener noreferrer' },
            h('span', { className:'nav-get-text' }, 'Get Research'),
            h('span', { className:'nav-get-icon', style:{ display:'none' } }, '↗')
          )
        )
      )
    ),

    /* ── Main ──────────────────────────────────── */
    h('main', { style:{ flex:1, maxWidth:1100, margin:'0 auto', width:'100%', padding:'28px 20px 60px' } },
      view === 's' && h(SView, { sectors, totalCos, onSel:goC }),
      view === 'c' && sec && h(CView, { sec, concall, onSel:goD }),
      view === 'd' && co && sec && h(DView, { co, sec, concall })
    ),

    /* ── Footer ────────────────────────────────── */
    h('footer', { style:{ background:SRF, borderTop:`1px solid ${BRD}`, padding:'14px 20px', textAlign:'center', marginBottom: barDone ? 0 : 56 } },
      h('span', { style:{ fontSize:11, color:MU } },
h('a', { href:'https://equityinsightselite.com', target:'_blank', rel:'noopener noreferrer', style:{ color:MU, textDecoration:'none' } }, 'Equity Insights Elite'),
        ' · Concall Research · ' + totalCos + ' companies · ' + sectors.length + ' sectors · Q4FY26 data as of May 2026'
      )
    ),

    /* ── Sticky CTA bar ────────────────────────── */
    h(StickyBar, { dismissed: barDone, onDismiss: () => setBarDone(true) })
  );
}

/* ── Sectors Page ─────────────────────────────────── */
function CTABanner() {
  return h('div', { className:'cta-banner', style:{
    marginTop:36, borderRadius:20,
    background:`linear-gradient(135deg, ${CTA_BLUE_DARK} 0%, ${CTA_BLUE} 100%)`,
    padding:'32px 28px',
    boxShadow:'0 8px 40px rgba(37,99,235,0.28)', position:'relative', overflow:'hidden'
  }},
    h('div', { style:{ position:'absolute', right:-40, top:-40, width:200, height:200, borderRadius:'50%', background:'rgba(255,255,255,0.06)', pointerEvents:'none' } }),
    h('div', { style:{ position:'absolute', right:60, bottom:-60, width:140, height:140, borderRadius:'50%', background:'rgba(255,255,255,0.04)', pointerEvents:'none' } }),

    /* icon */
    h('div', { className:'cta-icon', style:{ flexShrink:0, width:52, height:52, borderRadius:14, background:'rgba(255,255,255,0.12)', alignItems:'center', justifyContent:'center' } },
      h('svg', { width:26, height:26, viewBox:'0 0 24 24', fill:'none', stroke:'#BFDBFE', strokeWidth:1.8, strokeLinecap:'round', strokeLinejoin:'round' },
        h('path', { d:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' })
      )
    ),

    /* text */
    h('p', { style:{ flex:1, minWidth:0, fontSize:14, color:'#fff', margin:0, lineHeight:1.6 } }, CTA_TEXT),

    /* CTA button */
    h('a', {
      href: CTA_HREF, target:'_blank', rel:'noopener noreferrer',
      className: 'cta-btn',
      style:{ fontSize:13, padding:'12px 24px' }
    }, 'Get Started →')
  );
}

function SView({ sectors, totalCos, onSel }) {
  return h('div', null,
    h('div', { style:{ marginBottom:26 } },
      h('h1', { style:{ fontSize:23, fontWeight:700, color:TX, fontFamily:"'Space Grotesk',sans-serif", margin:'0 0 6px' } }, 'Sector Coverage'),
      h('p',  { style:{ fontSize:13, color:S2, margin:0 } }, totalCos + ' companies · ' + sectors.length + ' sectors · Q4FY26 concall tracker')
    ),
    h('div', { className:'sector-grid' },
      ...sectors.map(s => h(SCard, { key:s.id, s, onClick:()=>onSel(s.id) }))
    ),
    h(CTABanner)
  );
}

function SCard({ s, onClick }) {
  const [hov, setHov] = useState(false);
  return h('div', {
    style:{
      background: SRF,
      border: `1.5px solid ${hov ? s.ac : BRD}`,
      borderRadius: 18,
      overflow: 'hidden',
      cursor: 'pointer',
      boxShadow: hov ? `0 20px 48px ${s.ac}30` : '0 2px 10px rgba(0,0,0,0.06)',
      transform: hov ? 'translateY(-5px)' : 'translateY(0)',
      transition: 'all 0.22s ease',
    },
    onClick, onMouseEnter:()=>setHov(true), onMouseLeave:()=>setHov(false)
  },
    /* Gradient header */
    h('div', { style:{
      background: `linear-gradient(140deg, ${s.ac}20 0%, ${s.ac}08 100%)`,
      padding: '20px 22px 16px',
      borderBottom: `1px solid ${s.ac}20`,
    }},
      h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }},
        h('div', null,
          h('div', { style:{ display:'flex', alignItems:'center', gap:7, marginBottom:8 }},
            h('div', { style:{ width:8, height:8, borderRadius:'50%', background:s.ac, flexShrink:0 }}),
            h('span', { style:{ fontSize:10, fontWeight:700, color:s.ac, textTransform:'uppercase', letterSpacing:'0.9px' }}, s.nm)
          ),
          h('div', { style:{ fontSize:30, fontWeight:700, color:TX, fontFamily:"'Space Grotesk',sans-serif", lineHeight:1 }}, s.cos.length),
          h('div', { style:{ fontSize:11, color:S2, marginTop:4 }}, 'companies tracked')
        ),
        s.d && h('div', { style:{
          background:'#059669', color:'#fff',
          fontSize:9, fontWeight:700, padding:'4px 10px', borderRadius:20, letterSpacing:'0.5px', marginTop:2
        }}, 'Q4FY26 ✓')
      )
    ),
    /* Body */
    h('div', { style:{ padding:'16px 22px 20px' }},
      h('p', { style:{ fontSize:12, color:S2, lineHeight:1.7, margin:'0 0 14px' }}, s.desc),
      h('div', { style:{ display:'flex', gap:5, flexWrap:'wrap', marginBottom:18 }},
        ...s.cos.slice(0,4).map((c,i) =>
          h('span', { key:i, style:{
            fontSize:10, color:s.ac, background:s.al,
            borderRadius:6, padding:'3px 10px', fontWeight:600
          }}, sn(c).split(' ')[0])
        ),
        s.cos.length > 4 && h('span', { key:'m', style:{ fontSize:10, color:MU, alignSelf:'center' }}, '+' + (s.cos.length-4) + ' more')
      ),
      h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center' }},
        h('span', { style:{ fontSize:11, color:s.d?'#059669':MU, fontWeight:s.d?600:400 }},
          s.d ? '● Research available' : '○ Coming soon'
        ),
        h('div', { style:{
          width:32, height:32, borderRadius:'50%',
          background: hov ? s.ac : s.al,
          display:'flex', alignItems:'center', justifyContent:'center',
          transition:'all 0.22s ease', flexShrink:0
        }},
          h('svg', { width:14, height:14, viewBox:'0 0 24 24', fill:'none', stroke: hov ? '#fff' : s.ac, strokeWidth:2.5, strokeLinecap:'round', strokeLinejoin:'round' },
            h('path', { d:'M5 12h14M12 5l7 7-7 7' })
          )
        )
      )
    )
  );
}

/* ── Companies Page ───────────────────────────────── */
function CView({ sec, concall, onSel }) {
  const [search, setSearch] = useState('');
  const filtered = search
    ? sec.cos.filter(c => c.toLowerCase().includes(search.toLowerCase()))
    : sec.cos;

  return h('div', null,
    h('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12, marginBottom:18 } },
      h('div', { style:{ display:'flex', alignItems:'center', gap:10 } },
        h('div', { style:{ width:12, height:12, borderRadius:'50%', background:sec.ac } }),
        h('h1', { style:{ fontSize:20, fontWeight:700, color:TX, fontFamily:"'Space Grotesk',sans-serif" } }, sec.nm),
        h('span', { style:{ fontSize:13, color:MU } }, '· ' + sec.cos.length + ' companies')
      ),
      h('div', { style:{ position:'relative' } },
        h('input', {
          value:search, onChange:e=>setSearch(e.target.value), placeholder:'Search…',
          style:{ background:SRF, border:`1px solid ${BRD}`, borderRadius:7, padding:'6px 12px 6px 30px', fontSize:12, color:TX, width:180, outline:'none' }
        }),
        h('span', { style:{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:MU, fontSize:12, pointerEvents:'none' } }, '⌕')
      )
    ),
    filtered.length === 0
      ? h('p', { style:{ color:MU, fontSize:13 } }, 'No companies match "' + search + '"')
      : h('div', { className:'company-grid' },
          ...filtered.map(c => h(CCard, { key:c, c, sec, hasData:!!concall[c], onClick:()=>onSel(c) }))
        )
  );
}

function CCard({ c, sec, hasData, onClick }) {
  const [hov, setHov] = useState(false);
  return h('div', {
    style:{
      background: SRF,
      border: `1.5px solid ${hov ? sec.ac : BRD}`,
      borderRadius: 14,
      overflow: 'hidden',
      cursor: 'pointer',
      boxShadow: hov ? `0 12px 32px ${sec.ac}28` : '0 2px 8px rgba(0,0,0,0.05)',
      transform: hov ? 'translateY(-4px)' : 'translateY(0)',
      transition: 'all 0.2s ease',
    },
    onClick, onMouseEnter:()=>setHov(true), onMouseLeave:()=>setHov(false)
  },
    /* Gradient header */
    h('div', { style:{
      background: `linear-gradient(140deg, ${sec.ac}1A 0%, ${sec.ac}08 100%)`,
      padding: '18px 20px 16px',
      borderBottom: `1px solid ${sec.ac}1A`,
    }},
      h('div', { style:{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }},
        h('div', { style:{ width:7, height:7, borderRadius:'50%', background: sec.ac, flexShrink:0 }}),
        h('span', { style:{ fontSize:10, fontWeight:700, color:sec.ac, textTransform:'uppercase', letterSpacing:'0.8px' }}, sec.nm)
      ),
      h('div', { style:{ fontSize:15, fontWeight:700, color:TX, lineHeight:1.4 }}, sn(c))
    ),
    /* Footer */
    h('div', { style:{ padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center' }},
      hasData
        ? h('div', { style:{ background:'#059669', color:'#fff', fontSize:10, fontWeight:700, padding:'3px 10px', borderRadius:20, letterSpacing:'0.4px' }}, 'Q4FY26 ✓')
        : h('span', { style:{ fontSize:11, color:MU }}, '○ No data yet'),
      h('div', { style:{
        width:30, height:30, borderRadius:'50%',
        background: hov ? sec.ac : sec.al,
        display:'flex', alignItems:'center', justifyContent:'center',
        transition:'all 0.2s ease', flexShrink:0
      }},
        h('svg', { width:13, height:13, viewBox:'0 0 24 24', fill:'none', stroke: hov ? '#fff' : sec.ac, strokeWidth:2.5, strokeLinecap:'round', strokeLinejoin:'round' },
          h('path', { d:'M5 12h14M12 5l7 7-7 7' })
        )
      )
    )
  );
}

/* ── Detail Page ──────────────────────────────────── */
function DView({ co, sec, concall }) {
  const d = concall[co];

  if (!d) return h('div', { style:{ textAlign:'center', padding:'80px 0' } },
    h('div', { style:{ width:64, height:64, borderRadius:18, background:sec.al, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' } },
      h('span', { style:{ fontSize:28 } }, '🔬')
    ),
    h('div', { style:{ fontSize:16, fontWeight:700, color:TX, marginBottom:8, fontFamily:"'Space Grotesk',sans-serif" } }, 'Research in Progress'),
    h('p', { style:{ fontSize:13, color:S2, maxWidth:300, margin:'0 auto' } }, 'Q4FY26 concall data for ' + sn(co) + ' hasn\'t been added yet.')
  );

  return h('div', { style:{ display:'flex', flexDirection:'column', gap:12 } },

    /* ── Hero Header ── */
    h('div', { style:{
      background:`linear-gradient(140deg, ${sec.ac}1C 0%, ${sec.ac}08 100%)`,
      border:`1.5px solid ${sec.ac}28`, borderRadius:18,
      padding:'24px 24px 20px', position:'relative', overflow:'hidden'
    }},
      h('div', { style:{ position:'absolute', right:-24, top:-24, width:130, height:130, borderRadius:'50%', background:`${sec.ac}0E`, pointerEvents:'none' } }),
      h('div', { style:{ display:'flex', gap:8, marginBottom:14 } },
        h('span', { style:{ fontSize:10, fontWeight:700, color:sec.ac, background:sec.al, padding:'4px 11px', borderRadius:20, textTransform:'uppercase', letterSpacing:'0.6px' } }, sec.nm),
        h('span', { style:{ fontSize:10, color:MU, background:SRF, border:`1px solid ${BRD}`, padding:'3px 10px', borderRadius:20 } }, d.quarter || 'Q4FY26')
      ),
      h('h1', { style:{ fontSize:22, fontWeight:700, color:TX, margin:'0 0 6px', fontFamily:"'Space Grotesk',sans-serif", lineHeight:1.2 } }, sn(co)),
      h('div', { style:{ fontSize:11, color:S2 } }, 'NSE / BSE Listed · Indian Equity · Data as of May 2026')
    ),

    /* ── Metrics ── */
    d.metrics && d.metrics.length > 0 && h('div', { className:'metrics-grid' },
      ...d.metrics.map((m,i) => {
        const col = pct(m);
        const bg  = col === '#059669' ? '#ECFDF5' : col === '#EF4444' ? '#FEF2F2' : '#F8FAFC';
        return h('div', { key:i, style:{
          background:SRF, border:`1.5px solid ${BRD}`,
          borderLeft:`4px solid ${col}`,
          borderRadius:12, padding:'14px 16px'
        }},
          h('div', { style:{ fontSize:9, color:MU, textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:6 } }, m.label),
          h('div', { style:{ fontSize:18, fontWeight:700, color:TX, marginBottom:6, fontFamily:"'Space Grotesk',sans-serif" } }, m.value),
          h('div', { style:{ display:'inline-flex', fontSize:10, fontWeight:600, color:col, background:bg, padding:'2px 8px', borderRadius:10 } }, m.change)
        );
      })
    ),

    /* ── FY Performance ── */
    d.fyPerformance && d.fyPerformance.length > 0 && h('div', { style:{ background:SRF, border:`1.5px solid ${BRD}`, borderRadius:14, overflow:'hidden' } },
      h('div', { style:{ padding:'13px 20px', background:`${sec.ac}09`, borderBottom:`1px solid ${sec.ac}1C` } },
        h('span', { style:{ fontSize:10, fontWeight:700, color:sec.ac, textTransform:'uppercase', letterSpacing:'0.9px' } }, 'Full Year Performance')
      ),
      h('div', null,
        ...d.fyPerformance.map((item,i) => h('div', { key:i, style:{
          display:'flex', gap:12, alignItems:'flex-start',
          padding:'11px 20px',
          borderBottom: i < d.fyPerformance.length-1 ? `1px solid ${BRD}` : 'none'
        }},
          h('div', { style:{ width:22, height:22, borderRadius:'50%', background:sec.al, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:1 }},
            h('svg', { width:10, height:10, viewBox:'0 0 24 24', fill:'none', stroke:sec.ac, strokeWidth:2.5, strokeLinecap:'round', strokeLinejoin:'round' },
              h('path', { d:'M12 19V5M5 12l7-7 7 7' })
            )
          ),
          h('span', { style:{ fontSize:12, color:S2, lineHeight:1.65 } }, item)
        ))
      )
    ),

    /* ── Numeric Guidance ── */
    d.hasNumericGuidance && d.guidance && d.guidance.length > 0 && h('div', { style:{ background:SRF, border:`1.5px solid ${sec.ac}30`, borderRadius:14, overflow:'hidden' } },
      h('div', { style:{ padding:'13px 20px', background:`${sec.ac}0C`, borderBottom:`1px solid ${sec.ac}22` } },
        h('span', { style:{ fontSize:10, fontWeight:700, color:sec.ac, textTransform:'uppercase', letterSpacing:'0.9px' } }, 'FY27 Guidance')
      ),
      h('div', null,
        ...d.guidance.map((g,i) => h('div', { key:i, style:{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          padding:'12px 20px',
          borderBottom: i < d.guidance.length-1 ? `1px solid ${BRD}` : 'none'
        }},
          h('span', { style:{ fontSize:12, color:S2 } }, g.metric),
          h('span', { style:{ fontSize:13, fontWeight:700, color:sec.ac } }, g.value)
        ))
      )
    ),

    /* ── Outlook ── */
    !d.hasNumericGuidance && d.outlook && h('div', { style:{ background:SRF, border:`1.5px solid ${sec.ac}28`, borderRadius:14, overflow:'hidden' } },
      h('div', { style:{ padding:'13px 20px', background:`${sec.ac}09`, borderBottom:`1px solid ${sec.ac}1C` } },
        h('span', { style:{ fontSize:10, fontWeight:700, color:sec.ac, textTransform:'uppercase', letterSpacing:'0.9px' } }, 'Management Outlook')
      ),
      h('p', { style:{ fontSize:12, color:S2, lineHeight:1.85, margin:0, padding:'16px 20px' } }, d.outlook)
    ),

    /* ── Key Highlights ── */
    d.highlights && d.highlights.length > 0 && h('div', { style:{ background:SRF, border:`1.5px solid ${BRD}`, borderRadius:14, overflow:'hidden' } },
      h('div', { style:{ padding:'13px 20px', background:'#F8FAFC', borderBottom:`1px solid ${BRD}` } },
        h('span', { style:{ fontSize:10, fontWeight:700, color:MU, textTransform:'uppercase', letterSpacing:'0.9px' } }, 'Key Highlights')
      ),
      h('div', null,
        ...d.highlights.map((hl,i) => h('div', { key:i, style:{
          display:'flex', gap:12, alignItems:'flex-start',
          padding:'12px 20px',
          borderBottom: i < d.highlights.length-1 ? `1px solid ${BRD}` : 'none'
        }},
          h('div', { style:{ width:8, height:8, borderRadius:'50%', background:sec.ac, flexShrink:0, marginTop:4 } }),
          h('span', { style:{ fontSize:12, color:S2, lineHeight:1.65 } }, hl)
        ))
      )
    ),
  );
}

/* ── Mount ───────────────────────────────────────── */
ReactDOM.render(h(App), document.getElementById('root'));
</script>
</body>
</html>
